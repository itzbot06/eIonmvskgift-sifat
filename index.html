<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Job Application</title>
    <style>
        /* মূল পেজ সেটআপ */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000; /* লোডিং এর সময় কালো দেখাবে */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* ব্যাকগ্রাউন্ড ইমেজ কন্টেইনার */
        .wrapper {
            position: relative;
            width: 100%;
            max-width: 500px; /* মোবাইলের জন্য স্ট্যান্ডার্ড সাইজ */
            height: 100vh;
            margin: 0 auto;
            /* আপনার ইমেজের ডিরেক্ট লিঙ্ক এখানে বসান */
            background: url('background.png') no-repeat center center;
            background-size: 100% 100%; /* ছবি কাটবে না, পুরো স্ক্রিনে ফিট হবে */
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* বাটনগুলো নিচে রাখার জন্য */
            align-items: center;
        }

        /* Apply Now বাটন ডিজাইন */
        .claim-btn {
            width: 85%;
            height: 55px;
            background: linear-gradient(180deg, #102a43, #024376);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 50px;
            color: white;
            font-size: 20px;
            font-weight: bold;
            text-transform: uppercase;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px; /* টাইমার থেকে দূরত্ব */
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
            transition: 0.3s;
            z-index: 10;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.04); }
            100% { transform: scale(1); }
        }

        .claim-btn:hover {
            background: linear-gradient(180deg, #024376, #102a43);
        }

        /* টাইমার বক্স ডিজাইন */
        .timer-info {
            width: 90%;
            background: rgba(16, 42, 67, 0.95); /* ডার্ক গ্লাস ইফেক্ট */
            padding: 15px 10px;
            border-radius: 20px 20px 0 0; /* নিচের দিকে ছবির সাথে মিশে থাকবে */
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            color: white;
            box-sizing: border-box;
        }

        .offer-txt {
            font-size: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .dot {
            height: 10px;
            width: 10px;
            background-color: #ff3131;
            border-radius: 50%;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        /* প্রগ্রেস বার */
        .indicator-bg {
            width: 90%;
            height: 8px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin: 0 auto;
            overflow: hidden;
        }

        .indicator-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            border-radius: 10px;
            transition: width 1s linear;
        }

        #timer-display {
            color: #ffcc00;
            font-weight: 800;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <a href="https://www.af9m8trk.com/RWG11EZJ/TKR128DB/?s1=Sifat" class="claim-btn">
            Apply Now →
        </a>

        <div class="timer-info">
            <div class="offer-txt">
                <span class="dot"></span> Offer Expiring: <span id="timer-display">04:43</span>
            </div>
            <div class="indicator-bg">
                <div class="indicator-fill" id="fill"></div>
            </div>
        </div>
    </div>

    <script>
        // টাইমার সেটআপ
        let time = 283; 
        const timerDisplay = document.getElementById('timer-display');
        const fill = document.getElementById('fill');
        const totalTime = 283; 

        const countdown = setInterval(() => {
            let minutes = Math.floor(time / 60);
            let seconds = time % 60;
            seconds = seconds < 10 ? '0' + seconds : seconds;
            minutes = minutes < 10 ? '0' + minutes : minutes;

            timerDisplay.innerHTML = `${minutes}:${seconds}`;
            
            let progressWidth = (time / totalTime) * 100;
            fill.style.width = progressWidth + "%";

            if (time <= 0) {
                clearInterval(countdown);
                timerDisplay.innerHTML = "00:00";
            } else {
                time--;
            }
        }, 1000);
    </script>
</body>
</html>
